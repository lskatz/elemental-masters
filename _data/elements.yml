# Source of truth for elemental data and game balance.
# Read by scripts/build.py to generate:
#   - assets/svg/elements/*.svg     (one icon per element)
#   - assets/js/generated-data.js   (consumed by the game)
#
# Each element has:
#   key:         internal id (also used as filename and CSS class)
#   name:        display name
#   emoji:       unicode emoji used for the boss avatar and element badge
#   color:       primary hex color for theming
#   color_dark:  darker shade for gradients
#   weakness:    the element key that beats this one (must be symmetric)
#   specials:    four special-attack names, one per tier (player levels
#                1-5, 6-10, 11-15, 16+). Tier index = floor((level-1)/5).
#   mobs:        list of {name, emoji} for varied regular enemies of this
#                element. The game picks one at random per battle.
#   boss_title:  title used when this element appears as a boss.

elements:
  - key: fire
    name: Fire
    emoji: "🔥"
    color: "#ff5a1f"
    color_dark: "#7a1d05"
    weakness: water
    specials: [Flame, Fireball, Inferno, Meteor]
    boss_title: Master of Flames
    mobs:
      - { name: "Fire Imp",     emoji: "👿" }
      - { name: "Ember Sprite", emoji: "✨" }
      - { name: "Cinder Wolf",  emoji: "🐺" }
      - { name: "Lava Pup",     emoji: "🐶" }

  - key: water
    name: Water
    emoji: "💧"
    color: "#3b9eff"
    color_dark: "#0b3a73"
    weakness: fire
    specials: [Splash, Wave, Tsunami, Maelstrom]
    boss_title: Master of Tides
    mobs:
      - { name: "Water Sprite",   emoji: "💧" }
      - { name: "Reef Crab",      emoji: "🦀" }
      - { name: "Tidal Imp",      emoji: "🐟" }
      - { name: "Stream Serpent", emoji: "🐍" }

  - key: wind
    name: Wind
