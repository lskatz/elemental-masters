# Non-elemental mobs. They appear at a configurable rate (see balance below)
# and are slightly stronger than elemental mobs because the weakness chart
# can't be used against them. Bosses are always elemental.
neutral_mobs:
  - { name: "Cave Bat",     emoji: "🦇" }
  - { name: "Dire Wolf",    emoji: "🐺" }
  - { name: "Stone Ogre",   emoji: "👹" }
  - { name: "Giant Spider", emoji: "🕷️" }
  - { name: "Skeleton",     emoji: "💀" }
  - { name: "Goblin",       emoji: "👺" }
  - { name: "Pit Scorpion", emoji: "🦂" }
  - { name: "Coiled Viper", emoji: "🐍" }

# Game balance constants — change these to tune difficulty.
balance:
  hero_base_hp: 50
  hero_hp_per_level: 10
  hero_base_attack: 8
  hero_attack_per_level: 2

  mob_base_hp: 30
  mob_hp_per_level: 7
  mob_base_attack: 6
  mob_attack_per_level: 1

  boss_hp_multiplier: 2.5
  boss_attack_multiplier: 1.5

  # Damage multipliers when the player's element is super-effective.
  super_effective_mob: 1.5
  super_effective_boss: 2.0

  # Special attack costs and damage.
  special_energy_cost: 30
  special_energy_max: 100
  special_energy_per_attack: 20
  special_damage_multiplier: 2.0

  # Defend reduces incoming damage.
  defend_damage_reduction: 0.5

  # Probability that a non-boss encounter spawns a neutral (non-elemental)
  # mob. Bosses are always elemental.
  neutral_mob_chance: 0.25
  # Stat boost for neutral mobs (compensates for not being weak to anything).
  neutral_mob_hp_multiplier: 1.2
  neutral_mob_attack_multiplier: 1.2

  # Retained for backward compatibility in generated balance data; gameplay
  # now unlocks after every boss until all elements are owned.
  element_unlock_levels: [5, 10, 15]
  max_elements: 13
