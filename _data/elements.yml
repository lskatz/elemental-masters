      - { name: "Wind Wisp",   emoji: "💨" }
      - { name: "Cloud Drake", emoji: "🐉" }
      - { name: "Sky Sparrow", emoji: "🐦" }
      - { name: "Gust Wraith", emoji: "👻" }

  - key: earth
    name: Earth
    emoji: "🪨"
    color: "#7a5a36"
    color_dark: "#3a2a16"
    weakness: wind
    specials: [Pebble, Rockslide, Quake, Mountain Crush]
