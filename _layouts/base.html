<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1033">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Elemental">
  <title>{{ page.title | default: site.title }}</title>

  <!-- PWA manifest + icons. iOS uses apple-touch-icon, others use the manifest. -->
  <link rel="manifest" href="{{ '/manifest.json' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/icons/icon-192.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ '/assets/icons/icon-192.png' | relative_url }}">

  <!-- Google Fonts: Fredoka. Preconnect first to shave a round-trip on load. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  {{ content }}

  <!--
    Register the service worker for offline support. Runs as soon as the
    page loads. Failure is swallowed because PWA-ness is a progressive
    enhancement — the game must work even where service workers aren't
    available (older Safari, file:// previews, etc.).
  -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker
          .register("{{ '/service-worker.js' | relative_url }}")
          .catch(function (err) {
            console.warn("Service worker registration failed:", err);
          });
      });
    }
  </script>
</body>
</html>
